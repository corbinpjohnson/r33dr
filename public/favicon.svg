<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64" fill="none">
  <!-- r33dr mark: an open book with an RSVP focal point. Original work, 2026 Corbin Johnson. -->
  <rect width="64" height="64" rx="14" fill="#1e1b2e"/>
  <!-- left page -->
  <path d="M32 18 C26 14 19 13 13 14 V46 C19 45 26 46 32 50 Z" fill="#5b8def"/>
  <!-- right page -->
  <path d="M32 18 C38 14 45 13 51 14 V46 C45 45 38 46 32 50 Z" fill="#a78bfa"/>
  <!-- spine -->
  <rect x="30.5" y="17" width="3" height="33" rx="1.5" fill="#cbd5f5"/>
  <!-- text lines, left -->
  <g stroke="#1e1b2e" stroke-width="2" stroke-linecap="round" opacity="0.55">
    <line x1="18" y1="22" x2="28" y2="23"/>
    <line x1="18" y1="28" x2="28" y2="29"/>
    <line x1="18" y1="34" x2="28" y2="35"/>
  </g>
  <!-- text lines, right -->
  <g stroke="#1e1b2e" stroke-width="2" stroke-linecap="round" opacity="0.55">
    <line x1="36" y1="23" x2="46" y2="22"/>
    <line x1="36" y1="29" x2="46" y2="28"/>
    <line x1="36" y1="35" x2="46" y2="34"/>
  </g>
  <!-- RSVP focal pivot: the single highlighted letter/point -->
  <circle cx="32" cy="40" r="4.5" fill="#f43f5e"/>
</svg>
